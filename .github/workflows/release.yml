# Java 发行 release workflow
# 触发方式：push tag v* 或 workflow_dispatch（手动/RC）
# 产物：四平台 distribution + checksum + 签名（条件）
# 失败策略：任一阶段失败不发布 partial release。
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，不带 v 前缀（例如 0.4 或 0.4.1-rc.1）"
        required: true
        default: "0.4"
      publish:
        description: "创建 GitHub Release；false 时只构建验证不发布"
        required: true
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ============================================================
  # 阶段 1：版本解析与前置校验
  # 校验位于 CI 入口 trust boundary：tag/ref 与 VERSION 文件一致性。
  # ============================================================
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 解析版本与发布模式
        id: resolve
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail

          file_version="$(tr -d '[:space:]' < VERSION)"
          publish="false"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?|[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9._-]+)?)$ ]]; then
              echo "::error::非法发布 tag：$tag。请使用 vX.Y 或 vX.Y.Z 格式。" >&2
              exit 1
            fi
            version="${tag#v}"
            publish="true"
          else
            version="${INPUT_VERSION}"
            if [[ ! "$version" =~ ^([0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?|[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9._-]+)?)$ ]]; then
              echo "::error::非法发布版本：$version。请使用 X.Y 或 X.Y.Z 格式。" >&2
              exit 1
            fi
            if [[ "${INPUT_PUBLISH}" == "true" ]]; then
              if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != "v${version}" ]]; then
                echo "::error::workflow_dispatch publish=true 必须在 v${version} tag ref 上运行。" >&2
                exit 1
              fi
              publish="true"
            fi
          fi

          # VERSION 文件是唯一真源，必须与发布版本一致
          if [[ "$file_version" != "$version" ]]; then
            echo "::error::VERSION($file_version) 与发布版本($version)不一致。请先更新 VERSION 文件。" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "发布版本: $version, 正式发布: $publish"

  # ============================================================
  # 阶段 2：质量门禁 —— 测试和静态检查
  # ============================================================
  quality:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
          build-scan-publish: false

      - name: 运行全部测试与质量检查
        run: ./gradlew check --no-daemon

  # ============================================================
  # 阶段 3：四平台并行构建
  # 每平台产出 distribution archive + checksum manifest。
  # ============================================================
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            arch: arm64
            artifact-suffix: macos-arm64
            archive-ext: tar.gz
          - os: macos-13
            platform: macos
            arch: x64
            artifact-suffix: macos-x64
            archive-ext: tar.gz
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact-suffix: linux-x64
            archive-ext: tar.gz
          - os: windows-latest
            platform: windows
            arch: x64
            artifact-suffix: windows-x64
            archive-ext: zip
    runs-on: ${{ matrix.os }}
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true
          build-scan-publish: false

      # 构建 distribution（含 jlink runtime image）
      - name: Build distribution (POSIX)
        if: runner.os != 'Windows'
        run: |
          ./gradlew :java:app-cli:runtimeDistTar :java:app-cli:distZip --no-daemon

      - name: Build distribution (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          .\gradlew.bat :java:app-cli:runtimeDistZip :java:app-cli:distZip --no-daemon

      # Smoke test：验证产物可运行
      - name: Smoke test (POSIX)
        if: runner.os != 'Windows'
        run: |
          ./gradlew :java:app-cli:installDist --no-daemon
          ./java/app-cli/build/install/app-cli/bin/app-cli --version
          ./java/app-cli/build/install/app-cli/bin/app-cli --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          .\gradlew.bat :java:app-cli:installDist --no-daemon
          java\app-cli\build\install\app-cli\bin\app-cli.bat --version
          java\app-cli\build\install\app-cli\bin\app-cli.bat --help

      # Checksum：生成 SHA-256 manifest
      - name: Generate checksums
        shell: bash
        run: |
          bash scripts/release/generate-checksums.sh java/app-cli/build/distributions

      # macOS 签名（条件：需要 Apple 证书 secret）
      - name: macOS codesign（条件）
        if: runner.os == 'macOS' && env.APPLE_CERT_P12 != ''
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          echo "::group::macOS codesign"
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERT_P12" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | head -1 | awk -F'"' '{print $2}')"
          if [[ -z "$IDENTITY" ]]; then
            echo "::error::未找到有效的 codesign identity" >&2
            exit 1
          fi

          # 签名 jlink runtime 中的 java 可执行文件
          find java/app-cli/build/jlink-image -name 'java' -type f \
            -exec codesign --force --sign "$IDENTITY" --options runtime {} \;

          # 签名 app launcher
          codesign --force --sign "$IDENTITY" --options runtime \
            java/app-cli/build/install/app-cli/bin/app-cli

          echo "::endgroup::"
          rm -f "$CERT_PATH"

      - name: macOS notarize（条件）
        if: runner.os == 'macOS' && env.APPLE_NOTARY_USER != '' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_NOTARY_USER: ${{ secrets.APPLE_NOTARY_USER }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DIST_ARCHIVE="$(ls java/app-cli/build/distributions/*-runtime-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive-ext }} 2>/dev/null | head -1)"
          if [[ -z "$DIST_ARCHIVE" ]]; then
            echo "::warning::未找到 runtime distribution archive，跳过 notarize"
            exit 0
          fi
          xcrun notarytool submit "$DIST_ARCHIVE" \
            --apple-id "$APPLE_NOTARY_USER" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      # Windows 签名（条件：需要代码签名证书）
      - name: Windows codesign（条件）
        if: runner.os == 'Windows' && env.WIN_CERT_PFX != ''
        env:
          WIN_CERT_PFX: ${{ secrets.WIN_CERTIFICATE_PFX }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $certPath = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_CERT_PFX))

          $files = @(
            "java\app-cli\build\install\app-cli\bin\app-cli.bat",
            "java\app-cli\build\jlink-image\bin\java.exe"
          )
          foreach ($f in $files) {
            if (Test-Path $f) {
              signtool sign /f $certPath /p $env:WIN_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $f
            }
          }
          Remove-Item $certPath

      # 上传产物
      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.artifact-suffix }}
          path: |
            java/app-cli/build/distributions/*
          retention-days: 30
          if-no-files-found: error

      - name: Upload checksum manifest
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.artifact-suffix }}
          path: java/app-cli/build/distributions/MANIFEST.SHA256
          retention-days: 30
          if-no-files-found: error

  # ============================================================
  # 阶段 4：汇总校验 + 升级/回滚 drill
  # 所有平台构建成功后才执行；失败时不进入发布阶段。
  # ============================================================
  verify-and-drill:
    runs-on: ubuntu-latest
    needs: [validate, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - name: Download all distributions
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: release-candidate/
          merge-multiple: false

      - name: Download all checksums
        uses: actions/download-artifact@v4
        with:
          pattern: checksum-*
          path: checksums/
          merge-multiple: false

      # 汇总并展示 checksum manifest
      - name: 汇总 checksum manifest
        run: |
          echo "===== Release Candidate Checksum Summary ====="
          find checksums/ -name 'MANIFEST.SHA256' -exec sh -c '
            echo "--- $(dirname {} | xargs basename) ---"
            grep -v "^#" {}
            echo
          ' \;

      # 验证 checksum 一致性：每平台 manifest 与对应 dist 文件交叉校验
      - name: 验证 checksum
        run: |
          set -euo pipefail
          total=0
          for checksum_dir in checksums/checksum-*/; do
            platform="$(basename "$checksum_dir" | sed 's/^checksum-//')"
            manifest="$checksum_dir/MANIFEST.SHA256"
            [[ -f "$manifest" ]] || continue

            # 对应平台 distribution 目录
            dist_dir="release-candidate/dist-${platform}"
            if [[ ! -d "$dist_dir" ]]; then
              echo "::error::未找到平台 $platform 的 distribution 产物" >&2
              exit 1
            fi

            # 复制到临时目录进行验证
            verify_dir="$(mktemp -d)"
            cp "$dist_dir"/* "$verify_dir/" 2>/dev/null || true
            cp "$manifest" "$verify_dir/MANIFEST.SHA256"

            if bash scripts/release/generate-checksums.sh "$verify_dir" --verify; then
              echo "PASS: $platform checksum 验证通过"
            else
              echo "::error::FAIL: $platform checksum 验证失败" >&2
              exit 1
            fi
            rm -rf "$verify_dir"
            total=$((total + 1))
          done
          if [[ "$total" -eq 0 ]]; then
            echo "::error::未找到任何 checksum manifest" >&2
            exit 1
          fi
          echo "全部 $total 个平台 checksum 验证通过"

      # 验证无 secret 泄漏
      - name: 验证无 secret 泄漏
        run: |
          if grep -rEi '(password|secret|token|api.?key)\s*[:=]\s*\S+' checksums/ release-candidate/ 2>/dev/null | grep -v '.class' | grep -v '.jar'; then
            echo "::error::发行产物中疑似包含 secret" >&2
            exit 1
          fi
          echo "Secret 泄漏检查通过"

      # 升级/回滚 drill：使用脱敏旧版本数据验证迁移安全性
      - name: 升级/回滚 drill
        shell: bash
        run: |
          set -euo pipefail
          echo "===== 升级/回滚 Drill ====="
          # 验证 drill 脚本存在且可执行
          if [[ -x scripts/release/drill-upgrade-rollback.sh ]]; then
            bash scripts/release/drill-upgrade-rollback.sh \
              --candidate-dir release-candidate \
              --version "${{ needs.validate.outputs.version || '0.4' }}"
          else
            echo "::warning::drill 脚本不可执行，跳过升级/回滚 drill"
          fi

  # ============================================================
  # 阶段 5：签名状态报告
  # ============================================================
  signing-status:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: 签名状态
        env:
          HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
          HAS_WIN_CERT: ${{ secrets.WIN_CERTIFICATE_PFX != '' }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "## 签名/公证状态"
          echo ""
          if [[ "$HAS_APPLE_CERT" == "true" ]]; then
            echo "- macOS codesign: 已配置"
          else
            echo "- macOS codesign: **BLOCKED_EXTERNAL** -- 缺少 APPLE_CERTIFICATE_P12 secret"
          fi
          if [[ "$HAS_APPLE_CERT" == "true" && "$IS_TAG" == "true" ]]; then
            echo "- macOS notarize: 已执行（tag 触发）"
          elif [[ "$HAS_APPLE_CERT" == "true" ]]; then
            echo "- macOS notarize: 跳过（非 tag 构建）"
          else
            echo "- macOS notarize: **BLOCKED_EXTERNAL** -- 缺少证书"
          fi
          if [[ "$HAS_WIN_CERT" == "true" ]]; then
            echo "- Windows codesign: 已配置"
          else
            echo "- Windows codesign: **BLOCKED_EXTERNAL** -- 缺少 WIN_CERTIFICATE_PFX secret"
          fi
          echo ""
          echo "签名 secret 缺失不阻塞 CI 构建，但正式发布前必须配置。"
          echo "详见 docs/release/signing-strategy.md"

  # ============================================================
  # 阶段 6：创建 GitHub Release
  # 仅当全部前置阶段通过且 publish=true 时执行。
  # 失败原子停止：任一前置阶段失败都不会到达此步骤。
  # ============================================================
  publish-release:
    runs-on: ubuntu-latest
    needs: [validate, verify-and-drill]
    if: always() && needs.validate.result == 'success' && needs.verify-and-drill.result == 'success' && needs.validate.outputs.publish == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 下载全部发行产物
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: release-assets/
          merge-multiple: true

      - name: 下载全部 checksum
        uses: actions/download-artifact@v4
        with:
          pattern: checksum-*
          path: checksum-platforms/
          merge-multiple: false

      - name: 发布 GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          # 收集所有发行文件
          assets=()
          for f in release-assets/*.tar.gz release-assets/*.zip; do
            [[ -f "$f" ]] && assets+=("$f")
          done

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::error::未找到发行归档文件" >&2
            exit 1
          fi

          # 合并所有平台 checksum 到单一 manifest（每平台 manifest 文件名相同，需分开读取）
          merged_manifest="MANIFEST.SHA256"
          {
            echo "# Feipi Session Browser v${VERSION} Distribution Manifest"
            echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "# Format: SHA256  SIZE  FILENAME"
            echo "#"
          } > "$merged_manifest"
          for m in checksum-platforms/*/MANIFEST.SHA256; do
            [[ -f "$m" ]] && grep -v "^#" "$m" >> "$merged_manifest"
          done
          assets+=("$merged_manifest")

          # Release notes
          notes_file="docs/releases/v${VERSION}.md"
          notes_args=(--generate-notes)
          if [[ -f "$notes_file" ]]; then
            notes_args=(--notes-file "$notes_file")
          fi

          gh release create "v${VERSION}" \
            "${assets[@]}" \
            --verify-tag \
            --title "v${VERSION}" \
            "${notes_args[@]}"

          echo "GitHub Release v${VERSION} 已发布"
