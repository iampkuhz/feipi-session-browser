name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，不带 v 前缀"
        required: true
        default: "0.2.0"
      publish:
        description: "发布 GitHub Release 和 GHCR 镜像；正式发布建议直接 push tag"
        required: true
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Resolve release version
        id: release
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail

          file_version="$(tr -d '[:space:]' < VERSION)"
          publish="false"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9._-]+)?$ ]]; then
              echo "非法发布 tag：$tag" >&2
              exit 1
            fi
            version="${tag#v}"
            publish="true"
          else
            version="${INPUT_VERSION}"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9._-]+)?$ ]]; then
              echo "非法发布版本：$version" >&2
              exit 1
            fi
            if [[ "${INPUT_PUBLISH}" == "true" ]]; then
              if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != "v${version}" ]]; then
                echo "workflow_dispatch publish=true 必须在 v${version} tag ref 上运行。" >&2
                echo "正式发布推荐：git tag v${version} && git push origin v${version}" >&2
                exit 1
              fi
              publish="true"
            fi
          fi

          if [[ "$file_version" != "$version" ]]; then
            echo "VERSION 与发布版本不一致：VERSION=$file_version release=$version" >&2
            exit 1
          fi

          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lc}/feipi-session-browser"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: ./scripts/session-browser.sh test

      - name: Build Python release packages
        run: ./scripts/session-browser.sh build-dist "${{ steps.release.outputs.version }}"

      - name: Verify Python release packages
        run: ./scripts/session-browser.sh verify-dist "${{ steps.release.outputs.version }}"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: feipi-session-browser-${{ steps.release.outputs.version }}-dist
          path: tmp/release/dist/*
          if-no-files-found: error

      - name: Build container image
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          image="${{ steps.release.outputs.image }}"
          tags=(-t "${image}:${version}")
          if [[ "$version" != *-* ]]; then
            tags+=(-t "${image}:latest")
          fi

          docker build \
            --build-arg "SESSION_BROWSER_VERSION=${version}" \
            --label "org.opencontainers.image.version=${version}" \
            --label "org.opencontainers.image.title=session-browser" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            "${tags[@]}" \
            .

      - name: Publish container image to GHCR
        if: steps.release.outputs.publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          image="${{ steps.release.outputs.image }}"

          echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker push "${image}:${version}"
          if [[ "$version" != *-* ]]; then
            docker push "${image}:latest"
          fi

      - name: Create GitHub Release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.release.outputs.version }}" \
            tmp/release/dist/* \
            --verify-tag \
            --title "v${{ steps.release.outputs.version }}" \
            --generate-notes
