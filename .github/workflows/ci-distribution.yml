# 三平台/架构 Distribution CI —— build、smoke test、checksum、签名（条件）
# 构建目标：macOS arm64、macOS x64、Linux x64、Windows x64
# 产物包含 jlink runtime image + checksum manifest。
name: CI Distribution

on:
  push:
    branches: [main, main_java]
    tags: ["v*"]
    paths:
      - 'java/**'
      - 'app-cli/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'scripts/release/**'
      - '.github/workflows/ci-distribution.yml'
  pull_request:
    paths:
      - 'java/**'
      - 'app-cli/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'scripts/release/**'
      - '.github/workflows/ci-distribution.yml'
  workflow_dispatch:

concurrency:
  group: ci-dist-${{ github.ref }}
  cancel-in-progress: true

# 最小权限：只读内容，artifact 上传由 upload-artifact action 自行处理
permissions:
  contents: read

jobs:
  # ============================================================
  # 四平台并行构建 —— 每平台产出 distribution + checksum
  # ============================================================
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            arch: arm64
            artifact-suffix: macos-arm64
            archive-ext: tar.gz
          - os: macos-13
            platform: macos
            arch: x64
            artifact-suffix: macos-x64
            archive-ext: tar.gz
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact-suffix: linux-x64
            archive-ext: tar.gz
          - os: windows-latest
            platform: windows
            arch: x64
            artifact-suffix: windows-x64
            archive-ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/main_java' }}
          build-scan-publish: false

      # ----------------------------------------------------------
      # 构建 distribution（含 jlink runtime image）
      # ----------------------------------------------------------
      - name: Build distribution (POSIX)
        if: runner.os != 'Windows'
        run: |
          ./gradlew :java:app-cli:runtimeDistTar :java:app-cli:distZip \
            --no-daemon

      - name: Build distribution (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          .\gradlew.bat :java:app-cli:runtimeDistZip :java:app-cli:distZip --no-daemon

      # ----------------------------------------------------------
      # Smoke test：验证产物可运行
      # ----------------------------------------------------------
      - name: Smoke test (POSIX)
        if: runner.os != 'Windows'
        run: |
          ./gradlew :java:app-cli:installDist --no-daemon
          ./java/app-cli/build/install/app-cli/bin/app-cli --version
          ./java/app-cli/build/install/app-cli/bin/app-cli --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          .\gradlew.bat :java:app-cli:installDist --no-daemon
          java\app-cli\build\install\app-cli\bin\app-cli.bat --version
          java\app-cli\build\install\app-cli\bin\app-cli.bat --help

      # ----------------------------------------------------------
      # Checksum：生成 SHA-256 manifest
      # ----------------------------------------------------------
      - name: Generate checksums
        shell: bash
        run: |
          bash scripts/release/generate-checksums.sh java/app-cli/build/distributions

      # ----------------------------------------------------------
      # macOS 签名（条件：需要 Apple 证书 secret）
      # 缺少 secret 时 fail closed，标记 BLOCKED_EXTERNAL。
      # ----------------------------------------------------------
      - name: macOS codesign（条件）
        if: runner.os == 'macOS' && env.APPLE_CERT_P12 != ''
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          echo "::group::macOS codesign"
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERT_P12" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | head -1 | awk -F'"' '{print $2}')"
          if [[ -z "$IDENTITY" ]]; then
            echo "::error::未找到有效的 codesign identity" >&2
            exit 1
          fi

          # 签名 jlink runtime 中的 java 可执行文件
          find java/app-cli/build/jlink-image -name 'java' -type f \
            -exec codesign --force --sign "$IDENTITY" --options runtime {} \;

          # 签名 app launcher
          codesign --force --sign "$IDENTITY" --options runtime \
            java/app-cli/build/install/app-cli/bin/app-cli

          echo "::endgroup::"
          rm -f "$CERT_PATH"

      - name: macOS notarize（条件）
        if: runner.os == 'macOS' && env.APPLE_NOTARY_USER != '' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_NOTARY_USER: ${{ secrets.APPLE_NOTARY_USER }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DIST_ARCHIVE="$(ls java/app-cli/build/distributions/*-runtime-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive-ext }} 2>/dev/null | head -1)"
          if [[ -z "$DIST_ARCHIVE" ]]; then
            echo "::warning::未找到 runtime distribution archive，跳过 notarize"
            exit 0
          fi
          xcrun notarytool submit "$DIST_ARCHIVE" \
            --apple-id "$APPLE_NOTARY_USER" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      # ----------------------------------------------------------
      # Windows 签名（条件：需要代码签名证书）
      # 缺少 secret 时 fail closed，标记 BLOCKED_EXTERNAL。
      # ----------------------------------------------------------
      - name: Windows codesign（条件）
        if: runner.os == 'Windows' && env.WIN_CERT_PFX != ''
        env:
          WIN_CERT_PFX: ${{ secrets.WIN_CERTIFICATE_PFX }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $certPath = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_CERT_PFX))

          $files = @(
            "java\app-cli\build\install\app-cli\bin\app-cli.bat",
            "java\app-cli\build\jlink-image\bin\java.exe"
          )
          foreach ($f in $files) {
            if (Test-Path $f) {
              signtool sign /f $certPath /p $env:WIN_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $f
            }
          }
          Remove-Item $certPath

      # ----------------------------------------------------------
      # 上传产物：每平台独立 artifact
      # ----------------------------------------------------------
      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.artifact-suffix }}
          path: |
            java/app-cli/build/distributions/*
          retention-days: 14
          if-no-files-found: error

      - name: Upload checksum manifest
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.artifact-suffix }}
          path: java/app-cli/build/distributions/MANIFEST.SHA256
          retention-days: 30
          if-no-files-found: error

  # ============================================================
  # 汇总校验：收集所有平台 checksum 并交叉验证
  # ============================================================
  verify:
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success'
    steps:
      - name: Download all checksums
        uses: actions/download-artifact@v4
        with:
          pattern: checksum-*
          path: checksums/

      - name: 汇总并展示 manifest
        run: |
          echo "===== Distribution Checksum Summary ====="
          find checksums/ -name 'MANIFEST.SHA256' -exec sh -c '
            echo "--- $(dirname {} | xargs basename) ---"
            grep -v "^#" {}
            echo
          ' \;

      - name: 验证无 secret 泄漏
        run: |
          # 扫描 artifact 内容，确认不包含疑似 secret/token/password 的明文
          if grep -rEi '(password|secret|token|api.?key)\s*[:=]\s*\S+' checksums/ 2>/dev/null; then
            echo "::error::checksum artifact 中疑似包含 secret" >&2
            exit 1
          fi
          echo "Secret 泄漏检查通过"

  # ============================================================
  # 签名状态报告：当签名 secret 缺失时显式标记
  # ============================================================
  signing-status:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: 签名状态
        env:
          HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
          HAS_WIN_CERT: ${{ secrets.WIN_CERTIFICATE_PFX != '' }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "## 签名/公证状态"
          echo ""
          if [[ "$HAS_APPLE_CERT" == "true" ]]; then
            echo "- macOS codesign: 已配置"
          else
            echo "- macOS codesign: **BLOCKED_EXTERNAL** — 缺少 APPLE_CERTIFICATE_P12 secret"
          fi
          if [[ "$HAS_APPLE_CERT" == "true" && "$IS_TAG" == "true" ]]; then
            echo "- macOS notarize: 已执行（tag 触发）"
          elif [[ "$HAS_APPLE_CERT" == "true" ]]; then
            echo "- macOS notarize: 跳过（非 tag 构建）"
          else
            echo "- macOS notarize: **BLOCKED_EXTERNAL** — 缺少证书"
          fi
          if [[ "$HAS_WIN_CERT" == "true" ]]; then
            echo "- Windows codesign: 已配置"
          else
            echo "- Windows codesign: **BLOCKED_EXTERNAL** — 缺少 WIN_CERTIFICATE_PFX secret"
          fi
          echo ""
          echo "签名 secret 缺失不阻塞 CI 构建，但正式发布前必须配置。"
          echo "详见 docs/release/signing-strategy.md"
