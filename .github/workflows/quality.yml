name: Quality

on:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Format check
        run: ./scripts/session-browser.sh format-check

      - name: Ruff lint
        run: ./scripts/session-browser.sh lint

      - name: Pyright
        run: ./scripts/session-browser.sh type

      - name: Docstring checks
        run: ./scripts/session-browser.sh doc

      - name: Tests with coverage
        run: ./scripts/session-browser.sh coverage

      - name: Security and dependency checks
        run: |
          ./scripts/session-browser.sh audit
          ./scripts/session-browser.sh deps-check

      - name: Complexity and dead code checks
        run: |
          ./scripts/session-browser.sh complexity
          ./scripts/session-browser.sh dead-code

      - name: Required quality gates
        run: python scripts/quality/run_required_quality_gates.py --include-session-detail --change-id ci-quality
