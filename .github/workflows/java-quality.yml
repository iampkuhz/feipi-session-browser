name: Java Quality

on:
  push:
    branches: [main, main_java]
    paths:
      - 'java/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/java-quality.yml'
  pull_request:
    paths:
      - 'java/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
  workflow_dispatch:

concurrency:
  group: java-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle check
        run: ./gradlew check

      - name: CLI smoke test
        run: |
          ./gradlew :java:app-cli:installDist
          ./java/app-cli/build/install/app-cli/bin/app-cli --help
          ./java/app-cli/build/install/app-cli/bin/app-cli --version

  java-full:
    runs-on: ubuntu-latest
    needs: java-check
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: qualityFull
        run: ./gradlew qualityFull

      - name: verifyChineseJavaComments
        run: ./gradlew verifyChineseJavaComments
