{# Context Inspector — Hi-Fi structure (Task 11) #}
<div class="insp-head">
    <button class="insp-close" onclick="window.closeInspector()" aria-label="Close Inspector">›</button>
    <div>
        <div class="insp-title" id="insp-title">Context Inspector</div>
        <div class="insp-sub" id="insp-sub">selected object=round/span/call</div>
    </div>
</div>
<div class="insp-body">
    {# Empty state — shown when no object selected #}
    <div id="insp-empty-state" class="empty-state">
        <div class="empty-state__icon">⊹</div>
        <div class="empty-state__title">No object selected</div>
        <div class="empty-state__desc">Click a round or call row to inspect.</div>
    </div>
    {# Tab bar (hidden until content is loaded) #}
    <div class="insp-tabs" id="insp-tabs" style="display:none">
        <button class="active" data-tab="overview" onclick="Inspector.switchTab('overview')">Overview</button>
        <button data-tab="payload" onclick="Inspector.switchTab('payload')">Payload</button>
        <button data-tab="tools" onclick="Inspector.switchTab('tools')">Tools</button>
    </div>
    {# Tab content area #}
    <div id="insp-tab-content"></div>
</div>
