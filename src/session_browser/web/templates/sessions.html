{% extends "base.html" %}
{% set active_page = 'sessions' %}

{% block title %}Sessions - Agent Run Profiler{% endblock %}

{% block shell_class %} no-inspector{% endblock %}
{% block inspector %}{% endblock %}

{% block content %}

<section class="card sessions-card">
    <div class="card-body">

<!-- Filter row (server-side) -->
<form id="session-filter-form" class="filter-bar" method="get" action="/sessions">
    <input id="session-search" type="text" name="q" placeholder="Search title or session ID..."
           class="filter-bar__input filter-bar__input--search" value="{{ filter_q }}" />
    <select id="filter-agent" name="agent" class="filter-bar__select">
        <option value="">All Agents</option>
        <option value="claude_code" {% if filter_agent == 'claude_code' %}selected{% endif %}>Claude Code</option>
        <option value="qoder" {% if filter_agent == 'qoder' %}selected{% endif %}>Qoder</option>
        <option value="codex" {% if filter_agent == 'codex' %}selected{% endif %}>Codex</option>
    </select>
    <select id="filter-model" name="model" class="filter-bar__select">
        <option value="">All Models</option>
        {% for m in model_list %}
        <option value="{{ m }}" {% if filter_model == m %}selected{% endif %}>{{ m }}</option>
        {% endfor %}
    </select>
    <select id="filter-project" name="project" class="filter-bar__select filter-bar__select--project">
        <option value="">All Projects</option>
        {% for p in project_list %}
        <option value="{{ p }}" {% if filter_project == p %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
    </select>
    <input type="hidden" id="sort-input" name="sort" value="{{ sort_by }}" />
    <button class="filter-bar__btn" id="clear-all-btn" type="button" style="display:{% if filter_q or filter_agent or filter_model or filter_project %}''{% else %}none{% endif %}" onclick="resetSessionFilters()">Clear All</button>
    <button class="filter-bar__btn" id="apply-filter-btn" type="submit">Apply</button>
</form>

<!-- Grid + pagination (server-rendered, AJAX-replaceable) -->
<div id="sessions-grid-container">{% include "partials/sessions_grid.html" %}</div>

<script>
/* ---------- Inspector demo ------------------------------------------ */
window.openDemoInspector = function() {
    if (typeof openInspector !== 'function') {
        alert('Inspector JS 未加载');
        return;
    }
    openInspector({
        title: 'Demo Session',
        metadata: {
            'Type': { value: 'session' },
            'Agent': { value: 'claude_code' },
            'Model': { value: 'claude-sonnet-4-20250514' },
            'Session ID': { value: 'demo-20250101-abc123', mono: true }
        },
        summary: '这是一条演示数据，用于验证 Inspector 面板的打开/关闭、滚动保持与 Esc 关闭功能。',
        related: [
            { label: '查看完整 Session', href: '/sessions/claude_code/demo-20250101-abc123' },
            { label: '所属 Project', href: '/projects/demo-project' }
        ],
        viewerHtml: '<p class="text-muted text-xs">Viewer slot 预留区域，后续接入 request/response viewer。</p>'
    });
};

(function() {
    var STORAGE_KEY = 'agent-run-profiler:sessions:filters';

    /* ---------- Sort state ------------------------------------------ */
    var DEFAULT_SORT_KEY = 'ended-at';
    var DEFAULT_SORT_DIR = 'desc';
    var sortKey = '{{ sort_by | default("ended-at") }}' || DEFAULT_SORT_KEY;
    var sortDir = DEFAULT_SORT_DIR;

    function cycleSort(clickedKey) {
        if (clickedKey === sortKey) {
            if (sortDir === 'desc') {
                sortDir = 'asc';
            } else {
                sortKey = DEFAULT_SORT_KEY;
                sortDir = DEFAULT_SORT_DIR;
            }
        } else {
            sortKey = clickedKey;
            sortDir = 'desc';
        }
    }

    /* ---------- Sort helpers ---------------------------------------- */
    function initHeaderSort() {
        var grid = document.querySelector('[data-sessions-grid]');
        if (!grid) return;
        var head = grid.querySelector('.table-head');
        if (!head) return;

        head.addEventListener('click', function(e) {
            var th = e.target.closest('.th-sortable');
            if (!th) return;
            cycleSort(th.dataset.sortKey);
            updateHeaderStates();
            submitFilters();
        });
    }

    function updateHeaderStates() {
        document.querySelectorAll('.table-head .th-sortable').forEach(function(th) {
            th.classList.remove('th-sortable--active');
            th.removeAttribute('aria-sort');
            var existing = th.querySelector('.th-sort-arrow');
            if (existing) existing.remove();
        });

        var active = document.querySelector('.table-head .th-sortable[data-sort-key="' + sortKey + '"]');
        if (active) {
            active.classList.add('th-sortable--active');
            active.setAttribute('aria-sort', sortDir === 'desc' ? 'descending' : 'ascending');
            var arrow = document.createElement('span');
            arrow.className = 'th-sort-arrow';
            arrow.textContent = sortDir === 'desc' ? ' ↓' : ' ↑';
            active.appendChild(arrow);
        }
    }

    /* ---------- Row click → session detail -------------------------- */
    function initRowClick() {
        var grid = document.querySelector('[data-sessions-grid]');
        if (!grid) return;

        grid.addEventListener('click', function(e) {
            if (e.target.tagName === 'A' || e.target.closest('a')) return;

            var row = e.target.closest('.table-row');
            if (!row) return;

            window.location.href = '/sessions/' + row.dataset.agent + '/' + row.dataset.sessionId;
        });
    }

    /* ---------- Save / restore filters (local storage) ---------------- */
    function saveFilters() {
        var state = {
            q: document.getElementById('session-search').value,
            agent: document.getElementById('filter-agent').value,
            model: document.getElementById('filter-model').value,
            project: document.getElementById('filter-project').value,
            sortKey: sortKey,
            sortDir: sortDir
        };
        arpStorage.set(STORAGE_KEY, state);
    }

    /* ---------- AJAX filter submission ------------------------------ */
    var filterDebounceTimer = null;
    var isSubmitting = false;

    function submitFilters() {
        if (isSubmitting) return;
        isSubmitting = true;

        var btn = document.getElementById('apply-filter-btn');
        if (btn) {
            btn.disabled = true;
            btn.textContent = '…';
        }

        var params = new URLSearchParams();
        var q = document.getElementById('session-search').value;
        var agent = document.getElementById('filter-agent').value;
        var model = document.getElementById('filter-model').value;
        var project = document.getElementById('filter-project').value;

        if (q) params.set('q', q);
        if (agent) params.set('agent', agent);
        if (model) params.set('model', model);
        if (project) params.set('project', project);
        if (sortKey && sortKey !== DEFAULT_SORT_KEY) params.set('sort', sortKey);

        var currentParams = new URLSearchParams(window.location.search);
        var pageSize = currentParams.get('page_size');
        if (pageSize) params.set('page_size', pageSize);

        var qs = params.toString();
        var url = '/sessions' + (qs ? '?' + qs : '');

        fetch(url, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(function(resp) {
            if (!resp.ok) throw new Error('Network error: ' + resp.status);
            return resp.text();
        })
        .then(function(html) {
            var container = document.getElementById('sessions-grid-container');
            if (container) {
                container.innerHTML = html;
            }
            // Re-bind dynamic listeners on new content
            initRowClick();
            initHeaderSort();
            updateHeaderStates();
            updateClearButtonVisibility();
            // Update URL without reload
            history.pushState({ url: url }, '', url);
        })
        .catch(function(err) {
            console.error('[sessions] AJAX filter failed:', err);
            // Fallback: full navigation
            window.location.href = url;
        })
        .finally(function() {
            isSubmitting = false;
            if (btn) {
                btn.disabled = false;
                btn.textContent = 'Apply';
            }
        });
    }

    function submitFiltersDebounced() {
        clearTimeout(filterDebounceTimer);
        filterDebounceTimer = setTimeout(submitFilters, 400);
    }

    /* ---------- Pagination helpers ---------------------------------- */
    window.goToPage = function(targetPage) {
        var params = new URLSearchParams(window.location.search);
        params.set('page', String(targetPage));
        window.location.href = '/sessions?' + params.toString();
    };

    window.changePageSize = function(newSize) {
        var params = new URLSearchParams(window.location.search);
        params.set('page_size', newSize);
        params.set('page', '1');
        window.location.href = '/sessions?' + params.toString();
    };

    /* ---------- Reset filters ----------------------------------------- */
    window.resetSessionFilters = function() {
        window.location.href = '/sessions';
    };

    /* ---------- Clear All button visibility --------------------------- */
    function updateClearButtonVisibility() {
        var clearBtn = document.getElementById('clear-all-btn');
        if (clearBtn) {
            var q = document.getElementById('session-search').value;
            var agent = document.getElementById('filter-agent').value;
            var model = document.getElementById('filter-model').value;
            var project = document.getElementById('filter-project').value;
            var hasAnyFilter = q || agent || model || project;
            clearBtn.style.display = hasAnyFilter ? '' : 'none';
        }
    }

    /* ---------- Bind events ------------------------------------------- */
    var filterInputs = [
        'session-search', 'filter-agent', 'filter-model', 'filter-project'
    ];
    filterInputs.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) {
            el.addEventListener('change', submitFilters);
        }
    });

    // Debounced input for search field
    var searchEl = document.getElementById('session-search');
    if (searchEl) {
        searchEl.addEventListener('input', submitFiltersDebounced);
    }

    // Prevent default form submission (use AJAX instead)
    var form = document.getElementById('session-filter-form');
    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            submitFilters();
        });
    }

    /* Row click navigation */
    initRowClick();

    /* Sortable headers */
    initHeaderSort();
    updateHeaderStates();

    /* Clear All button visibility */
    updateClearButtonVisibility();

    /* ---------- Browser Back/Forward support ------------------------ */
    window.addEventListener('popstate', function(e) {
        if (e.state && e.state.url) {
            fetch(e.state.url, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(function(resp) { return resp.text(); })
            .then(function(html) {
                var container = document.getElementById('sessions-grid-container');
                if (container) {
                    container.innerHTML = html;
                }
                initRowClick();
                initHeaderSort();
                updateHeaderStates();
                updateClearButtonVisibility();
            });
        } else {
            window.location.reload();
        }
    });
})();
</script>

{% endblock %}
