services:
  session-browser:
    image: ${SESSION_BROWSER_IMAGE_REPO:-localhost/feipi/session-browser}:${SESSION_BROWSER_VERSION:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SESSION_BROWSER_VERSION: ${SESSION_BROWSER_VERSION:-0.1.0}
    container_name: session-browser
    ports:
      - "${SESSION_BROWSER_HOST_PORT:-8899}:8899"
    volumes:
      # Host agent data -> container data dirs
      - ~/.claude:/data/claude:ro
      - ~/.codex:/data/codex:ro
      - ~/.qoder:/data/qoder:ro
      # Persistent index
      - ${SESSION_BROWSER_DATA_DIR:-~/.local/share/feipi/session-browser/index}:/data/index
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8899
      SESSION_BROWSER_RUN_MODE: podman
      SESSION_BROWSER_LOG_LEVEL: ${SESSION_BROWSER_LOG_LEVEL:-INFO}
      SESSION_BROWSER_VERSION: ${SESSION_BROWSER_VERSION:-0.1.0}
      SESSION_BROWSER_STARTUP_SCAN: ${SESSION_BROWSER_STARTUP_SCAN:-1}
    restart: unless-stopped
    command: ["./scripts/session-browser.sh", "serve", "--allow-empty", "--startup-scan"]
